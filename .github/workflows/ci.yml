name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: portfolio
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: portfolio
        run: bun run check

      - name: Build static site
        working-directory: portfolio
        run: bun run build
        env:
          NODE_ENV: production
